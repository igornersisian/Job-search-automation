services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    command: python tools/telegram_bot.py

  cron:
    build: .
    restart: unless-stopped
    env_file: .env
    # Runs process_jobs.py every weekday at 9:00 UTC
    # Uses supercronic for reliable cron inside Docker
    command: >
      sh -c "
        mkdir -p /var/spool/cron/crontabs &&
        printf '0 9 * * 1-5 python /app/tools/process_jobs.py >> /var/log/cron.log 2>&1\n'
        > /var/spool/cron/crontabs/root &&
        chmod 600 /var/spool/cron/crontabs/root &&
        cron -f
      "
